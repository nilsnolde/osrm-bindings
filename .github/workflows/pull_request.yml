name: Pull Request

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:
    inputs:
      test-windows:
        description: 'Run tests on Windows'
        type: boolean
        default: true
        
# Cancel CI runs on a branch when new commits were pushed
# See https://stackoverflow.com/a/72408109/2582935
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - uses: pre-commit/action@v3.0.1

  build_wheels:
    needs: [lint]
    name: PR - cp*, ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}-${{ matrix.version }}
    strategy:
      fail-fast: true
      matrix:
        platform: [ubuntu, macos, windows]
        version: [latest]

    steps:
    - name: Checkout Project
      uses: actions/checkout@v6

    # ccache for Linux/macOS: mount host cache dir into the manylinux container via docker volume.
    # The manylinux image already has ccache configured as a compiler wrapper, so no CMAKE_*_COMPILER_LAUNCHER needed for Linux.
    # macOS uses CMAKE_*_COMPILER_LAUNCHER=ccache explicitly since there's no container.
    - name: Restore ccache
      if: runner.os != 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ github.head_ref }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ github.head_ref }}-
          ccache-${{ runner.os }}-

    # sccache for Windows: like ccache but supports MSVC. No container on Windows,
    # so sccache runs directly on the runner.
    - name: Set up sccache dir
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p ~/.sccache
        echo "SCCACHE_DIR=$USERPROFILE\\.sccache" >> "$GITHUB_ENV"

    - name: Restore sccache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ~/.sccache
        key: sccache-${{ runner.os }}-${{ github.head_ref }}-${{ github.run_id }}
        restore-keys: |
          sccache-${{ runner.os }}-${{ github.head_ref }}-
          sccache-${{ runner.os }}-

    # Conan package manager cache (Windows only — Linux/macOS use system packages or the manylinux image).
    # Keyed on pyproject.toml hash since it contains OSRM_GIT_TAG which determines which conanfile is used.
    # Uses !cancelled() for save to avoid caching partial downloads from cancelled runs.
    - name: Restore Conan cache
      id: conan-cache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ~/.conan2
        key: v4-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          v4-conan-${{ runner.os }}-

    - name: Run CIBuildWheel
      uses: pypa/cibuildwheel@v3.4.0
      env:
        # Mount host ccache dir into manylinux container
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /tmp/ccache:/ccache"
        # Set ccache dir inside container to the mounted volume
        CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/usr/local/lib64:${LD_LIBRARY_PATH} CCACHE_DIR=/ccache"
        # macOS: no container, so pass ccache as cmake compiler launcher
        CIBW_CONFIG_SETTINGS_MACOS: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"
        # Windows: use sccache (MSVC-compatible) as cmake compiler launcher
        CIBW_CONFIG_SETTINGS_WINDOWS: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=sccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=sccache cmake.define.ENABLE_CONAN=ON"
        CIBW_ENVIRONMENT_WINDOWS: "SCCACHE_DIR=${USERPROFILE}\\.sccache"
        # Skip Windows tests unless explicitly enabled via workflow_dispatch
        CIBW_TEST_COMMAND_WINDOWS: ${{ inputs.test-windows == false && ' ' || '' }}

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.platform }}
        path: wheelhouse/*.whl

    - name: Save ccache
      uses: actions/cache/save@v5
      if: always() && runner.os != 'Windows'
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ github.head_ref }}-${{ github.run_id }}

    - name: Save sccache
      uses: actions/cache/save@v5
      if: always() && runner.os == 'Windows'
      with:
        path: ~/.sccache
        key: sccache-${{ runner.os }}-${{ github.head_ref }}-${{ github.run_id }}

    # Don't save conan cache on cancellation or if exact key was already cached
    - name: Save Conan cache
      uses: actions/cache/save@v5
      if: "!cancelled() && runner.os == 'Windows' && steps.conan-cache.outputs.cache-hit != 'true'"
      with:
        path: ~/.conan2
        key: v4-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

  # Verify that committed .pyi stubs match the actual C++ bindings.
  # Installs the Linux wheel, regenerates stubs via nanobind, and diffs against the repo.
  check_stubs:
    name: Check stubs are up to date
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - uses: actions/download-artifact@v4
      with:
        name: wheels-ubuntu
        path: wheelhouse
    - name: Install wheel and regenerate stubs
      run: |
        pip install nanobind ruff
        pip install wheelhouse/*.whl
        python -m nanobind.stubgen -m osrm.osrm_ext -o src/osrm/osrm_ext.pyi
        ruff format src/osrm/osrm_ext.pyi
    - name: Check for differences
      run: git diff --exit-code src/osrm/osrm_ext.pyi || (echo "::error::Stubs are out of date. Rebuild locally and commit the updated .pyi file." && exit 1)
