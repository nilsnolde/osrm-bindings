name: Pull Request

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  build_wheels:
    name: Linux - cp*
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        platform: [ubuntu]
        version: [latest]

    steps:
    - name: Checkout Project
      uses: actions/checkout@v3

    - name: Run CIBuildWheel
      uses: pypa/cibuildwheel@v3.4.0
