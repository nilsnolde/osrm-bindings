name: Publish Wheels

on:
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to TestPyPI'
        type: boolean
        default: false
  push:
    branches-ignore:
      - '*'
    # branches:
    #   - nn-update-osrm
    tags:
      - '*'

jobs:
  build_wheels:
    name: Wheels - cp*, ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
          - name: macOS arm64
            runner: macos-latest
          - name: Windows amd64
            runner: windows-latest

    steps:
    - name: Checkout Project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Restore compiler caches from main branch
    - name: Restore ccache
      if: runner.os != 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ runner.arch }}-main
        restore-keys: |
          ccache-${{ runner.os }}-${{ runner.arch }}-

    - name: Restore Conan cache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ~/.conan2
        key: v4-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          v4-conan-${{ runner.os }}-

    - name: Run CIBuildWheel
      uses: pypa/cibuildwheel@v3.4.0
      env:
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /tmp/ccache:/ccache"
        CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/usr/local/lib64:${LD_LIBRARY_PATH} CCACHE_DIR=/ccache"
        CIBW_CONFIG_SETTINGS_MACOS: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"
        # Windows: no compiler cache — VS generator doesn't support CMAKE_CXX_COMPILER_LAUNCHER.
        CIBW_CONFIG_SETTINGS_WINDOWS: "cmake.define.ENABLE_CONAN=ON"

    - name: Upload Wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.name }}
        path: wheelhouse/*.whl

  upload_all:
    name: Upload if Release
    if: startsWith(github.ref, 'refs/tags') || inputs.upload == true
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@v1.13.0
      with:
        verbose: true
        # repository-url: https://test.pypi.org/legacy/
