name: Push Master

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
        
# Cancel CI runs on a branch when new commits were pushed
# See https://stackoverflow.com/a/72408109/2582935
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Push - cp312 SABI, ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}-${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu, macos, windows]
        version: [latest]

    steps:
    - name: Checkout Project
      uses: actions/checkout@v6

    - name: Restore ccache
      if: runner.os != 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ github.ref_name }}-
          ccache-${{ runner.os }}-

    - name: Set up sccache
      if: runner.os == 'Windows'
      shell: bash
      run: |
        pip install sccache
        mkdir -p "$USERPROFILE/.sccache"
        echo "SCCACHE_DIR=$USERPROFILE/.sccache" >> "$GITHUB_ENV"
        echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
        echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"

    - name: Restore sccache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          sccache-${{ runner.os }}-${{ github.ref_name }}-
          sccache-${{ runner.os }}-

    - name: Start sccache server
      if: runner.os == 'Windows'
      shell: bash
      run: sccache --start-server && sccache --show-stats

    - name: Restore Conan cache
      id: conan-cache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ~/.conan2
        key: v2-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          v2-conan-${{ runner.os }}-

    - name: Run CIBuildWheel
      uses: pypa/cibuildwheel@v3.4.0
      env:
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /tmp/ccache:/ccache"
        CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/usr/local/lib64:${LD_LIBRARY_PATH} CCACHE_DIR=/ccache"
        CIBW_CONFIG_SETTINGS_MACOS: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"
        CIBW_ENVIRONMENT_WINDOWS: "CMAKE_CXX_COMPILER_LAUNCHER=sccache CMAKE_C_COMPILER_LAUNCHER=sccache SCCACHE_DIR=$SCCACHE_DIR"
        CIBW_CONFIG_SETTINGS_WINDOWS: "cmake.define.ENABLE_CONAN=ON"

    - name: Stop sccache server
      if: always() && runner.os == 'Windows'
      shell: bash
      run: sccache --show-stats || true; sccache --stop-server || true

    - name: Save ccache
      uses: actions/cache/save@v5
      if: always() && runner.os != 'Windows'
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

    - name: Save sccache
      uses: actions/cache/save@v5
      if: always() && runner.os == 'Windows'
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

    - name: Save Conan cache
      uses: actions/cache/save@v5
      if: "runner.os == 'Windows' && steps.conan-cache.outputs.cache-hit != 'true'"
      with:
        path: ~/.conan2
        key: v2-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
