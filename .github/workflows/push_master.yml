name: Push Master

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  build_wheels:
    name: Push - cp312 SABI, ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}-${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu, macos, windows]
        version: [latest]

    steps:
    - name: Checkout Project
      uses: actions/checkout@v6

    - name: Restore ccache
      if: runner.os != 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ github.ref_name }}-
          ccache-${{ runner.os }}-

    - name: Restore Conan cache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          conan-${{ runner.os }}-

    - name: Run CIBuildWheel
      uses: pypa/cibuildwheel@v3.4.0
      env:
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /tmp/ccache:/ccache"
        CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/usr/local/lib64:${LD_LIBRARY_PATH} CCACHE_DIR=/ccache"
        CIBW_CONFIG_SETTINGS_LINUX: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"
        CIBW_CONFIG_SETTINGS_MACOS: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.platform }}
        path: wheelhouse/*.whl

    - name: Save ccache
      uses: actions/cache/save@v5
      if: always() && runner.os != 'Windows'
      with:
        path: /tmp/ccache
        key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

    - name: Save Conan cache
      uses: actions/cache/save@v5
      if: always() && runner.os == 'Windows'
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
